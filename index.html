<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecTap — Spin to Win + Pro Job Specs</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    canvas { max-width: 100%; height: auto; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-5 md:p-8">
    <header class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-14 h-14 bg-emerald-500 rounded-3xl flex items-center justify-center text-4xl">🔨</div>
        <h1 class="text-5xl font-bold tracking-tighter">SpecTap</h1>
      </div>
      <p class="text-xl text-zinc-400">Clear job specs in 60 seconds • Better tradie quotes</p>
      <div class="badge badge-success mt-4">Perth WA • 2026</div>
    </header>

    <!-- Spin Wheel -->
    <div class="mb-12 bg-zinc-900 border border-zinc-700 rounded-3xl p-8 text-center relative">
      <h2 class="text-3xl font-bold mb-2">🎰 Spin to Win a Discount!</h2>
      <p class="text-zinc-400 mb-6">Spin for 5%, 10%, or 20% off your next trade job</p>
      
      <div class="relative flex justify-center mb-8">
        <!-- Fixed Red Pointer -->
        <div class="absolute -top-3 left-1/2 -translate-x-1/2 z-30">
          <div class="w-0 h-0 
                      border-l-[22px] border-l-transparent 
                      border-r-[22px] border-r-transparent 
                      border-b-[38px] border-b-red-500 
                      drop-shadow-2xl"></div>
        </div>
        
        <canvas id="wheel" width="360" height="360"></canvas>
      </div>

      <button onclick="spinWheel()" id="spinBtn" 
        class="btn btn-primary btn-lg text-xl px-14 py-4 rounded-2xl">
        SPIN THE WHEEL 🎡
      </button>

      <div id="result" class="mt-8 text-2xl font-bold min-h-[4.5rem]"></div>
    </div>

    <!-- Trade Selection -->
    <div id="home">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="trade-grid"></div>
    </div>

    <!-- Estimator -->
    <div id="estimator" class="hidden">
      <button onclick="backToHome()" class="flex items-center gap-2 text-zinc-400 hover:text-white mb-8">← Back</button>
      <h2 id="trade-title" class="text-4xl font-bold mb-8"></h2>
      <div id="questions" class="space-y-8"></div>

      <div class="mt-12 bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
        <h3 class="text-2xl font-semibold mb-4">Your Job Specification</h3>
        <div id="spec-output" class="bg-black/60 border border-zinc-800 rounded-2xl p-7 text-sm leading-relaxed whitespace-pre-wrap min-h-[220px] font-mono"></div>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-8">
          <button onclick="copySpec()" class="btn btn-primary">📋 Copy</button>
          <button onclick="downloadPDF()" class="btn btn-secondary">📄 PDF</button>
          <button onclick="shareLink()" class="btn btn-accent">🔗 Share</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const segments = [
      { label: "20% OFF", color: "#10b981" },
      { label: "🍌 Banana", color: "#eab308" },
      { label: "10% OFF", color: "#3b82f6" },
      { label: "🍌 Banana", color: "#eab308" },
      { label: "5% OFF", color: "#8b5cf6" },
      { label: "🍌 Banana", color: "#eab308" }
    ];

    let isSpinning = false;
    let currentAngle = 0;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = 165;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const anglePerSegment = (2 * Math.PI) / segments.length;

      segments.forEach((seg, i) => {
        const startAngle = currentAngle + i * anglePerSegment;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + anglePerSegment);
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = "#18181b";
        ctx.lineWidth = 8;
        ctx.stroke();

        // Improved text
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + anglePerSegment / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#111827";
        ctx.font = "bold 21px system-ui";
        ctx.fillText(seg.label, 0, -radius + 68);
        ctx.restore();
      });

      // Center
      ctx.beginPath();
      ctx.arc(centerX, centerY, 48, 0, 2 * Math.PI);
      ctx.fillStyle = "#18181b";
      ctx.fill();
    }

    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('result').innerHTML = '';

      const spins = 7 + Math.random() * 5;
      const extraAngle = Math.random() * 2 * Math.PI;
      const targetAngle = currentAngle + spins * 2 * Math.PI + extraAngle;

      let startTime = null;
      const duration = 4800;

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 4);
        currentAngle = targetAngle * eased;

        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          document.getElementById('spinBtn').disabled = false;

          const normalized = (currentAngle % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
          const index = Math.floor((2 * Math.PI - normalized) / (2 * Math.PI / segments.length)) % segments.length;
          const prize = segments[index];

          if (prize.label.includes('%')) {
            document.getElementById('result').innerHTML = `
              <span class="text-emerald-400 text-3xl">🎉 You won ${prize.label}!</span><br>
              <span class="text-zinc-400">Apply this discount when getting quotes!</span>
            `;
          } else {
            document.getElementById('result').innerHTML = `
              🍌 <span class="text-yellow-400">${prize.label}</span>! Better luck next time 🍌<br>
              <span class="text-zinc-400">Spin again for a discount!</span>
            `;
          }
        }
      }
      requestAnimationFrame(animate);
    }

    // Trade selector (kept simple)
    const trades = [
      { id: "fencing", name: "Fencing", icon: "🏡" },
      { id: "paving", name: "Paving", icon: "🧱" },
      { id: "painting", name: "Painting", icon: "🎨" },
      { id: "electrical", name: "Electrical", icon: "⚡" },
      { id: "plumbing", name: "Plumbing", icon: "🔧" },
      { id: "landscaping", name: "Landscaping", icon: "🌳" }
    ];

    let currentTrade = null;
    let answers = {};

    function renderHome() {
      const container = document.getElementById('trade-grid');
      container.innerHTML = trades.map(t => `
        <div onclick="startEstimator('${t.id}')" class="trade-card bg-zinc-900 border border-zinc-700 rounded-3xl p-8 cursor-pointer">
          <div class="text-7xl mb-6">${t.icon}</div>
          <h3 class="text-2xl font-semibold">${t.name}</h3>
        </div>
      `).join('');
    }

    function startEstimator(id) {
      currentTrade = trades.find(t => t.id === id);
      answers = {};
      document.getElementById('home').classList.add('hidden');
      document.getElementById('estimator').classList.remove('hidden');
      document.getElementById('trade-title').textContent = currentTrade.name;
      document.getElementById('questions').innerHTML = `
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
          <label class="block mb-3 text-sm font-medium">Size / Quantity</label>
          <input type="text" onchange="updateAnswer('size', this.value)" class="input input-bordered w-full bg-zinc-800" placeholder="e.g. 25 metres">
        </div>
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
          <label class="block mb-3 text-sm font-medium">Extras / Notes</label>
          <textarea onchange="updateAnswer('notes', this.value)" class="textarea textarea-bordered w-full h-28 bg-zinc-800"></textarea>
        </div>
      `;
    }

    function updateAnswer(key, value) {
      answers[key] = value;
      generateSpec();
    }

    function generateSpec() {
      let spec = `JOB SPEC — ${currentTrade.name}\nDate: ${new Date().toLocaleDateString('en-AU')}\nLocation: Perth WA\n\n`;
      Object.keys(answers).forEach(k => { if (answers[k]) spec += `${k.toUpperCase()}: ${answers[k]}\n\n`; });
      spec += `Please quote exactly on this scope.`;
      document.getElementById('spec-output').textContent = spec;
    }

    function copySpec() { navigator.clipboard.writeText(document.getElementById('spec-output').textContent).then(() => alert("✅ Copied!")); }
    function downloadPDF() {
      const text = document.getElementById('spec-output').textContent;
      const win = window.open('', '_blank');
      win.document.write(`<pre style="padding:40px;font-family:monospace;white-space:pre-wrap;">${text}</pre>`);
      win.document.close();
      setTimeout(() => win.print(), 500);
    }
    function shareLink() { alert("Copy the spec and send to tradies!"); }
    function backToHome() {
      document.getElementById('estimator').classList.add('hidden');
      document.getElementById('home').classList.remove('hidden');
    }

    window.onload = () => {
      drawWheel();
      renderHome();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecTap — Pro Job Specs for Tradie Quotes</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .trade-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .trade-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
    }
    .spec-box {
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-5 md:p-8">
    <!-- Header -->
    <header class="text-center mb-12">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🔨</div>
        <h1 class="text-5xl font-bold tracking-tighter text-white">SpecTap</h1>
      </div>
      <p class="text-2xl text-zinc-400 max-w-md mx-auto">Build clear, professional job specs in ~60 seconds.<br>Get better, comparable quotes from tradies.</p>
      <div class="flex justify-center gap-4 mt-6 text-sm">
        <div class="badge badge-success badge-lg">Perth • WA</div>
        <div class="badge badge-outline badge-lg">2026 Pricing</div>
      </div>
    </header>

    <!-- Home Screen -->
    <div id="home">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="trade-grid"></div>
    </div>

    <!-- Estimator Screen -->
    <div id="estimator" class="hidden">
      <button onclick="backToHome()" class="flex items-center gap-2 text-zinc-400 hover:text-white mb-8 transition-colors">
        ← Back to all trades
      </button>

      <div class="flex items-center justify-between mb-8">
        <h2 id="trade-title" class="text-4xl font-bold"></h2>
        <div id="progress" class="text-sm text-emerald-400 font-medium"></div>
      </div>

      <div id="questions" class="space-y-8"></div>

      <div class="mt-16 bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-2xl font-semibold">Your Professional Job Spec</h3>
          <span class="text-xs uppercase tracking-widest text-zinc-500">Ready to send</span>
        </div>
        <div id="spec-output" class="spec-box bg-black/50 border border-zinc-800 rounded-2xl p-7 text-sm leading-relaxed text-zinc-300 min-h-[240px]"></div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-8">
          <button onclick="copySpec()" class="btn btn-primary h-14 text-lg">📋 Copy Spec</button>
          <button onclick="downloadPDF()" class="btn btn-secondary h-14 text-lg">📄 Save as PDF</button>
          <button onclick="shareLink()" class="btn btn-accent h-14 text-lg">🔗 Share Link</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const trades = [
      { id: "fencing", name: "Fencing", icon: "🏡", color: "emerald", desc: "Colorbond, timber, aluminium, pool" },
      { id: "paving", name: "Paving", icon: "🧱", color: "amber", desc: "Brick, concrete, stone, aggregate" },
      { id: "painting", name: "Painting", icon: "🎨", color: "violet", desc: "Interior, exterior, prep & finish" },
      { id: "electrical", name: "Electrical", icon: "⚡", color: "blue", desc: "Lights, power points, switchboards" },
      { id: "plumbing", name: "Plumbing", icon: "🔧", color: "cyan", desc: "Taps, hot water, drains, gas" },
      { id: "landscaping", name: "Landscaping", icon: "🌳", color: "lime", desc: "Turf, retic, retaining walls" }
    ];

    let currentTrade = null;
    let answers = {};

    function renderHome() {
      const container = document.getElementById('trade-grid');
      container.innerHTML = trades.map(t => `
        <div onclick="startEstimator('${t.id}')" class="trade-card bg-zinc-900 border border-zinc-700 rounded-3xl p-8 cursor-pointer group">
          <div class="text-7xl mb-6 transition-transform group-hover:scale-110">${t.icon}</div>
          <h3 class="text-2xl font-semibold mb-2">${t.name}</h3>
          <p class="text-zinc-400">${t.desc}</p>
          <div class="mt-8 text-xs uppercase tracking-widest text-emerald-400 font-medium">Tap to start →</div>
        </div>
      `).join('');
    }

    function startEstimator(id) {
      currentTrade = trades.find(t => t.id === id);
      answers = {};
      document.getElementById('home').classList.add('hidden');
      document.getElementById('estimator').classList.remove('hidden');
      document.getElementById('trade-title').innerHTML = `${currentTrade.icon} ${currentTrade.name}`;
      renderQuestions();
    }

    function renderQuestions() {
      // Simple demo questions - you can expand later
      const demoQuestions = [
        { label: "Job Type / Material", key: "type", type: "select", options: ["Standard", "Premium", "Custom"] },
        { label: "Size / Quantity", key: "size", type: "number", placeholder: "e.g. 25 metres or 40 m²" },
        { label: "Any extras or special requirements?", key: "notes", type: "textarea" }
      ];

      const container = document.getElementById('questions');
      container.innerHTML = demoQuestions.map((q, i) => `
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
          <label class="block text-sm font-medium mb-3">${q.label}</label>
          ${q.type === 'select' ? `
            <select onchange="updateAnswer('${q.key}', this.value)" class="select select-bordered w-full bg-zinc-800 border-zinc-600 text-white">
              <option value="">Select option...</option>
              ${q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
            </select>` : q.type === 'number' ? `
            <input type="number" onchange="updateAnswer('${q.key}', this.value)" placeholder="${q.placeholder}" class="input input-bordered w-full bg-zinc-800 border-zinc-600 text-white">
          ` : `
            <textarea onchange="updateAnswer('${q.key}', this.value)" class="textarea textarea-bordered w-full h-32 bg-zinc-800 border-zinc-600 text-white" placeholder="e.g. Include gate, specific colour, urgency..."></textarea>
          `}
        </div>
      `).join('');
    }

    function updateAnswer(key, value) {
      answers[key] = value;
      generateSpec();
    }

    function generateSpec() {
      let spec = `📋 PROFESSIONAL JOB SPECIFICATION\n`;
      spec += `Trade: ${currentTrade.name}\n`;
      spec += `Date: ${new Date().toLocaleDateString('en-AU')}\n`;
      spec += `Location: Perth, Western Australia\n\n`;
      spec += `────────────────────────────\n\n`;

      Object.keys(answers).forEach(key => {
        if (answers[key]) {
          spec += `${key.toUpperCase()}: ${answers[key]}\n\n`;
        }
      });

      spec += `Please provide a fixed price quote based exactly on the details above.\n`;
      spec += `Any questions or site visit needed? Let me know.\n\n`;
      spec += `Thank you!`;

      document.getElementById('spec-output').textContent = spec;
    }

    function copySpec() {
      const text = document.getElementById('spec-output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert("✅ Spec copied to clipboard!\nPaste it into SMS, email, or Facebook message.");
      });
    }

    function downloadPDF() {
      const text = document.getElementById('spec-output').textContent;
      const win = window.open('', '_blank');
      win.document.write(`
        <html><head><title>SpecTap Job Spec</title></head>
        <body style="padding:40px; font-family:monospace; line-height:1.7; white-space:pre-wrap;">${text}</body></html>
      `);
      win.document.close();
      setTimeout(() => win.print(), 500);
    }

    function shareLink() {
      alert("🔗 Shareable link feature coming soon!\n\nFor now: Copy the spec above and send it directly to tradies.");
    }

    function backToHome() {
      document.getElementById('estimator').classList.add('hidden');
      document.getElementById('home').classList.remove('hidden');
    }

    // Initialize
    window.onload = renderHome;
  </script>
</body>
</html>

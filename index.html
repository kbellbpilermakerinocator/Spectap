<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecTap — Spin to Win</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    canvas { max-width: 100%; height: auto; touch-action: none; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-md mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-400">SpecTap</h1>
      <p class="text-zinc-400">60-second job specs for better tradie quotes</p>
      <div class="badge badge-success mt-4">Perth • WA • 2026</div>
    </header>

    <!-- Spin Wheel Section -->
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 mb-12">
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold">🎰 Spin to Win a Discount!</h2>
        <p class="text-zinc-400">5% • 10% • 20% off your next trade job</p>
      </div>

      <div class="relative mx-auto" style="width: 300px; height: 300px;">
        <!-- Fixed Red Pointer -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 z-20" style="margin-top: -10px;">
          <div class="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-b-[40px] border-b-red-500 drop-shadow-xl"></div>
        </div>

        <canvas id="wheel" width="300" height="300"></canvas>
      </div>

      <button onclick="spinWheel()" id="spinBtn"
        class="w-full mt-8 btn btn-primary text-lg py-4 rounded-2xl font-bold">
        SPIN THE WHEEL 🎡
      </button>

      <div id="result" class="mt-8 text-center text-2xl font-bold min-h-[70px]"></div>
    </div>

    <!-- Trade selection (basic for now) -->
    <div id="home" class="grid grid-cols-2 gap-4">
      <!-- JS will fill this -->
    </div>
  </div>

  <script>
    // Wheel segments - 6 pieces
    const segments = [
      { label: "20% OFF", color: "#10b981" },
      { label: "Banana", color: "#eab308" },
      { label: "10% OFF", color: "#3b82f6" },
      { label: "Banana", color: "#eab308" },
      { label: "5% OFF",  color: "#8b5cf6" },
      { label: "Banana", color: "#eab308" }
    ];

    let currentRotation = 0;
    let isSpinning = false;

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const centerX = 150;
    const centerY = 150;
    const radius = 135;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const slice = (2 * Math.PI) / segments.length;

      segments.forEach((seg, i) => {
        const start = currentRotation + i * slice;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, start + slice);
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = "#27272a";
        ctx.lineWidth = 8;
        ctx.stroke();

        // Text - upright and clear
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 20px system-ui";
        ctx.fillText(seg.label, 0, -radius * 0.6);
        ctx.restore();
      });

      // Center dot
      ctx.beginPath();
      ctx.arc(centerX, centerY, 35, 0, 2 * Math.PI);
      ctx.fillStyle = "#18181b";
      ctx.fill();
      ctx.strokeStyle = "#64748b";
      ctx.lineWidth = 12;
      ctx.stroke();
    }

    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;
      document.getElementById("spinBtn").disabled = true;
      document.getElementById("result").innerHTML = "";

      const spins = 8 + Math.random() * 7;
      const finalAngle = currentRotation + spins * 2 * Math.PI + Math.random() * Math.PI;

      let startTime = null;
      const duration = 5200;

      function animate(time) {
        if (!startTime) startTime = time;
        const progress = Math.min((time - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 4); // nice slow down

        currentRotation = finalAngle * eased;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          document.getElementById("spinBtn").disabled = false;

          // Calculate winner
          const normalized = currentRotation % (2 * Math.PI);
          const index = Math.floor((2 * Math.PI - normalized) / (2 * Math.PI / segments.length)) % segments.length;
          const prize = segments[index];

          if (prize.label.includes("OFF")) {
            document.getElementById("result").innerHTML = `
              🎉 <span class="text-emerald-400">You won ${prize.label}!</span><br>
              <span class="text-zinc-400 text-base">Use it when you send your spec to tradies!</span>
            `;
          } else {
            document.getElementById("result").innerHTML = `
              🍌 Banana! Better luck next time 🍌<br>
              <span class="text-zinc-400 text-base">Spin again!</span>
            `;
          }
        }
      }

      requestAnimationFrame(animate);
    }

    // Basic trade cards
    const trades = ["Fencing 🏡", "Paving 🧱", "Painting 🎨", "Electrical ⚡", "Plumbing 🔧", "Landscaping 🌳"];

    function renderTrades() {
      const container = document.getElementById("home");
      container.innerHTML = trades.map(t => `
        <div onclick="selectTrade('${t}')" 
             class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 text-center cursor-pointer hover:border-emerald-500 transition-colors">
          <div class="text-5xl mb-3">${t.split(' ')[1] || '🔨'}</div>
          <div class="font-semibold">${t.split(' ')[0]}</div>
        </div>
      `).join('');
    }

    function selectTrade(name) {
      alert(`Selected: ${name}\n\n(Full estimator coming next - for now the wheel works!)`);
    }

    // Start the app
    window.onload = () => {
      drawWheel();
      renderTrades();
    };
  </script>
</body>
</html>

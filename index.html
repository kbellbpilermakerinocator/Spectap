<script>
// ==================== SPIN WHEEL (Fixed to match screenshot) ====================
const segments = [
  { label: "20% OFF", color: "#eab308" },     // yellow
  { label: "Banana",  color: "#10b981" },     // green
  { label: "10% OFF", color: "#3b82f6" },     // blue
  { label: "Banana",  color: "#8b5cf6" },     // purple
  { label: "5% OFF",  color: "#eab308" },     // yellow
  { label: "Banana",  color: "#10b981" },     // green
  { label: "10% OFF", color: "#3b82f6" },     // blue
  { label: "Banana",  color: "#8b5cf6" }      // purple
];

let rotation = 0;
let isSpinning = false;
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function drawWheel() {
  const cx = 140, cy = 140, r = 125;
  ctx.clearRect(0, 0, 280, 280);
  const numSlices = segments.length;
  const slice = (2 * Math.PI) / numSlices;

  segments.forEach((seg, i) => {
    const start = rotation + i * slice;
    
    // Draw slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + slice);
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = "#18181b";
    ctx.lineWidth = 8;
    ctx.stroke();

    // Draw text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    
    ctx.textAlign = "center";
    ctx.fillStyle = "#111827";
    ctx.font = "bold 17px system-ui";
    
    // Split long labels if needed
    const words = seg.label.split(" ");
    if (words.length > 1) {
      ctx.fillText(words[0], 0, -72);
      ctx.fillText(words[1], 0, -48);
    } else {
      ctx.fillText(seg.label, 0, -60);
    }
    
    ctx.restore();
  });

  // Center hub
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
  ctx.fillStyle = "#18181b";
  ctx.fill();
  
  // Inner ring for polish
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  ctx.strokeStyle = "#27272a";
  ctx.lineWidth = 12;
  ctx.stroke();
}

function spinWheel() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("result").innerHTML = "";

  // More realistic spin: 5–8 full rotations + random landing
  const extraSpins = 5 + Math.random() * 4;
  const target = rotation + (extraSpins * 2 * Math.PI) + Math.random() * 2 * Math.PI;

  let startTime = null;
  const duration = 5200; // slightly longer for drama

  function animate(ts) {
    if (!startTime) startTime = ts;
    const progress = Math.min((ts - startTime) / duration, 1);
    
    // Strong ease-out for satisfying stop
    const eased = 1 - Math.pow(1 - progress, 4);
    rotation = target * eased;
    
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      document.getElementById("spinBtn").disabled = false;

      // Calculate which segment landed under the pointer (top)
      const normalizedRotation = rotation % (2 * Math.PI);
      const sliceAngle = (2 * Math.PI) / segments.length;
      let index = Math.floor((2 * Math.PI - normalizedRotation) / sliceAngle) % segments.length;

      const prize = segments[index];

      if (prize.label.includes("%")) {
        document.getElementById("result").innerHTML = 
          `🎉 You won <span class="text-emerald-400 font-bold">${prize.label}</span>!`;
      } else {
        document.getElementById("result").innerHTML = 
          `🍌 Banana! Better luck next time 😅`;
      }
    }
  }
  requestAnimationFrame(animate);
}
</script>

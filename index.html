<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecTap — Spin & Spec</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    canvas { max-width: 100%; height: auto; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-400">SpecTap</h1>
      <p class="text-zinc-400 mt-2">Clear job specs • Better tradie quotes</p>
      <div class="badge badge-success mt-4">Perth WA • 2026</div>
    </header>

    <!-- Spin Wheel -->
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 mb-12">
      <h2 class="text-3xl font-bold text-center mb-2">🎰 Spin to Win!</h2>
      <p class="text-center text-zinc-400 mb-8">5% • 10% • 20% off your next job</p>

      <div class="relative flex justify-center mb-8">
        <!-- Fixed Red Pointer -->
        <div class="absolute top-[-12px] left-1/2 -translate-x-1/2 z-30">
          <div class="w-0 h-0 border-l-8 border-l-transparent border-r-8 border-r-transparent border-b-[36px] border-b-red-500"></div>
        </div>

        <canvas id="wheel" width="360" height="360" class="drop-shadow-xl"></canvas>
      </div>

      <button onclick="spinWheel()" id="spinBtn"
        class="w-full btn btn-primary text-xl py-4 rounded-2xl font-bold">
        SPIN THE WHEEL 🎡
      </button>

      <div id="result" class="mt-8 text-center text-2xl font-bold min-h-[80px]"></div>
    </div>

    <!-- Trade Cards -->
    <div id="home" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <!-- Populated by JS -->
    </div>

    <!-- Estimator Screen -->
    <div id="estimator" class="hidden">
      <button onclick="backToHome()" class="text-zinc-400 mb-6">← Back</button>
      <h2 id="trade-title" class="text-4xl font-bold mb-6"></h2>
      <div id="questions" class="space-y-6"></div>

      <div class="mt-10 bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
        <h3 class="font-semibold mb-4">Your Job Spec</h3>
        <div id="spec-output" class="bg-zinc-950 p-6 rounded-2xl font-mono text-sm whitespace-pre-wrap min-h-[200px]"></div>
        <div class="flex gap-3 mt-6">
          <button onclick="copySpec()" class="flex-1 btn btn-primary">Copy</button>
          <button onclick="downloadPDF()" class="flex-1 btn btn-secondary">PDF</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const segments = [
      { label: "20% OFF", color: "#10b981" },
      { label: "Banana", color: "#eab308" },
      { label: "10% OFF", color: "#3b82f6" },
      { label: "Banana", color: "#eab308" },
      { label: "5% OFF",  color: "#8b5cf6" },
      { label: "Banana", color: "#eab308" }
    ];

    let currentAngle = 0;
    let isSpinning = false;

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const centerX = 180;
    const centerY = 180;
    const radius = 160;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const sliceAngle = (2 * Math.PI) / segments.length;

      segments.forEach((seg, i) => {
        const start = currentAngle + i * sliceAngle;

        // Segment
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, start + sliceAngle);
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = "#27272a";
        ctx.lineWidth = 10;
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(start + sliceAngle / 2);
        ctx.textAlign = "center";
        ctx.fillStyle = "#111827";
        ctx.font = "bold 22px system-ui";
        ctx.fillText(seg.label, 0, -radius + 75);
        ctx.restore();
      });

      // Center circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, 45, 0, 2 * Math.PI);
      ctx.fillStyle = "#18181b";
      ctx.fill();
    }

    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;
      document.getElementById("spinBtn").disabled = true;
      document.getElementById("result").innerHTML = "";

      const totalSpins = 8 + Math.random() * 6;
      const target = currentAngle + totalSpins * 2 * Math.PI + Math.random() * Math.PI * 2;

      let start = null;
      const duration = 5000;

      function animate(ts) {
        if (!start) start = ts;
        const elapsed = ts - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 5);   // strong slow-down

        currentAngle = target * eased;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          document.getElementById("spinBtn").disabled = false;

          // Find winning segment
          const normalized = currentAngle % (2 * Math.PI);
          let index = Math.floor((2 * Math.PI - normalized) / (2 * Math.PI / segments.length)) % segments.length;

          const prize = segments[index];

          if (prize.label.includes("%")) {
            document.getElementById("result").innerHTML = `
              <span class="text-emerald-400 text-3xl">🎉 You won ${prize.label}!</span><br>
              <span class="text-zinc-400">Use this discount on your tradie quotes!</span>
            `;
          } else {
            document.getElementById("result").innerHTML = `
              🍌 Banana! Better luck next time!<br>
              <span class="text-zinc-400">Spin again!</span>
            `;
          }
        }
      }
      requestAnimationFrame(animate);
    }

    // Simple trade selector (kept minimal)
    const trades = ["Fencing", "Paving", "Painting", "Electrical", "Plumbing", "Landscaping"];

    function renderHome() {
      const container = document.getElementById("home");
      container.innerHTML = trades.map(name => `
        <div onclick="startEstimator('${name}')" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 text-center cursor-pointer hover:border-emerald-500">
          <div class="text-6xl mb-4">🔨</div>
          <h3 class="text-2xl font-semibold">${name}</h3>
        </div>
      `).join('');
    }

    function startEstimator(name) {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("estimator").classList.remove("hidden");
      document.getElementById("trade-title").textContent = name;
    }

    function backToHome() {
      document.getElementById("estimator").classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
    }

    function copySpec() { alert("Spec copied! (add your full spec logic here)"); }
    function downloadPDF() { alert("PDF download coming soon"); }

    window.onload = () => {
      drawWheel();
      renderHome();
    };
  </script>
</body>
</html>

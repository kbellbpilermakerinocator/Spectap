<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecTap — Spin to Win + Pro Job Specs</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .trade-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .trade-card:hover { transform: translateY(-8px) scale(1.02); }
    canvas { max-width: 100%; height: auto; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-5 md:p-8">
    <!-- Header -->
    <header class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-14 h-14 bg-emerald-500 rounded-3xl flex items-center justify-center text-4xl">🔨</div>
        <h1 class="text-5xl font-bold tracking-tighter">SpecTap</h1>
      </div>
      <p class="text-xl text-zinc-400">Clear job specs in 60 seconds • Better tradie quotes</p>
      <div class="badge badge-success mt-4">Perth WA • 2026</div>
    </header>

    <!-- Spin Wheel Section -->
    <div class="mb-12 bg-zinc-900 border border-zinc-700 rounded-3xl p-8 text-center relative">
      <h2 class="text-3xl font-bold mb-2">🎰 Spin to Win a Discount!</h2>
      <p class="text-zinc-400 mb-6">Spin for 5%, 10%, or 20% off your next trade job</p>
      
      <div class="relative flex justify-center mb-6">
        <!-- Flicky Indicator (red pointer) -->
        <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 z-20">
          <div class="w-0 h-0 border-l-[18px] border-l-transparent border-r-[18px] border-r-transparent border-b-[32px] border-b-red-500 drop-shadow-lg"></div>
        </div>
        
        <canvas id="wheel" width="340" height="340"></canvas>
      </div>

      <button onclick="spinWheel()" id="spinBtn"
        class="btn btn-primary btn-lg text-xl px-12 py-4 rounded-2xl shadow-xl">
        SPIN THE WHEEL 🎡
      </button>
      
      <div id="result" class="mt-8 text-2xl font-bold min-h-[4rem]"></div>
    </div>

    <!-- Trade Selection (kept the same) -->
    <div id="home">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="trade-grid"></div>
    </div>

    <!-- Estimator (simplified for space) -->
    <div id="estimator" class="hidden">
      <button onclick="backToHome()" class="flex items-center gap-2 text-zinc-400 hover:text-white mb-8">← Back to Trades</button>
      <h2 id="trade-title" class="text-4xl font-bold mb-8"></h2>
      <div id="questions" class="space-y-8"></div>

      <div class="mt-12 bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
        <h3 class="text-2xl font-semibold mb-4">Your Job Specification</h3>
        <div id="spec-output" class="bg-black/60 border border-zinc-800 rounded-2xl p-7 text-sm leading-relaxed whitespace-pre-wrap min-h-[220px] font-mono"></div>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-8">
          <button onclick="copySpec()" class="btn btn-primary">📋 Copy</button>
          <button onclick="downloadPDF()" class="btn btn-secondary">📄 PDF</button>
          <button onclick="shareLink()" class="btn btn-accent">🔗 Share</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Spin Wheel Data - 6 segments
    const segments = [
      { label: "20% OFF", color: "#10b981", emoji: "🎉" },
      { label: "🍌 Banana", color: "#eab308", emoji: "🍌" },
      { label: "10% OFF", color: "#3b82f6", emoji: "🎉" },
      { label: "🍌 Banana", color: "#eab308", emoji: "🍌" },
      { label: "5% OFF",  color: "#8b5cf6", emoji: "🎉" },
      { label: "🍌 Banana", color: "#eab308", emoji: "🍌" }
    ];

    let isSpinning = false;
    let currentAngle = 0;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = 155;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const anglePerSegment = (2 * Math.PI) / segments.length;

      segments.forEach((seg, i) => {
        const startAngle = currentAngle + i * anglePerSegment;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + anglePerSegment);
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = "#27272a";
        ctx.lineWidth = 6;
        ctx.stroke();

        // Text - improved positioning and shorter labels
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + anglePerSegment / 2 + Math.PI / 2); // better rotation for readability
        ctx.textAlign = "center";
        ctx.fillStyle = "#111827";
        ctx.font = "bold 19px system-ui";
        ctx.fillText(seg.label, 0, radius - 45);
        ctx.restore();
      });

      // Center hub
      ctx.beginPath();
      ctx.arc(centerX, centerY, 45, 0, 2 * Math.PI);
      ctx.fillStyle = "#18181b";
      ctx.fill();
      ctx.strokeStyle = "#a1a1aa";
      ctx.lineWidth = 12;
      ctx.stroke();
    }

    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('result').innerHTML = '';

      const spins = 6 + Math.random() * 6; // more spins for fun
      const extraAngle = Math.random() * 2 * Math.PI;
      const targetAngle = currentAngle + spins * 2 * Math.PI + extraAngle;

      let startTime = null;
      const duration = 4500; // 4.5 seconds

      function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        
        const eased = 1 - Math.pow(1 - progress, 4); // nice slow down
        currentAngle = targetAngle * eased;

        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          document.getElementById('spinBtn').disabled = false;

          // Determine winning segment
          const normalizedAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
          const segmentIndex = Math.floor((2 * Math.PI - normalizedAngle) / (2 * Math.PI / segments.length)) % segments.length;
          const prize = segments[segmentIndex];

          let message = '';
          if (prize.label.includes('%')) {
            message = `<span class="text-emerald-400">${prize.emoji} You won ${prize.label}!</span><br><span class="text-zinc-400 text-base">Apply this discount when getting quotes!</span>`;
          } else {
            message = `🍌 ${prize.label}! Better luck next time 🍌<br><span class="text-zinc-400 text-base">Try spinning again!</span>`;
          }
          document.getElementById('result').innerHTML = message;
        }
      }
      requestAnimationFrame(animate);
    }

    // === Simple Trade Selector (rest of the app) ===
    const trades = [
      { id: "fencing", name: "Fencing", icon: "🏡", desc: "Colorbond, timber, pool" },
      { id: "paving", name: "Paving", icon: "🧱", desc: "Brick, stone, concrete" },
      { id: "painting", name: "Painting", icon: "🎨", desc: "Interior & exterior" },
      { id: "electrical", name: "Electrical", icon: "⚡", desc: "Lights, power points" },
      { id: "plumbing", name: "Plumbing", icon: "🔧", desc: "Taps, hot water" },
      { id: "landscaping", name: "Landscaping", icon: "🌳", desc: "Turf, reticulation" }
    ];

    let currentTrade = null;
    let answers = {};

    function renderHome() {
      const container = document.getElementById('trade-grid');
      container.innerHTML = trades.map(t => `
        <div onclick="startEstimator('${t.id}')" class="trade-card bg-zinc-900 border border-zinc-700 rounded-3xl p-8 cursor-pointer">
          <div class="text-7xl mb-6">${t.icon}</div>
          <h3 class="text-2xl font-semibold mb-2">${t.name}</h3>
          <p class="text-zinc-400">${t.desc}</p>
        </div>
      `).join('');
    }

    function startEstimator(id) {
      currentTrade = trades.find(t => t.id === id);
      answers = {};
      document.getElementById('home').classList.add('hidden');
      document.getElementById('estimator').classList.remove('hidden');
      document.getElementById('trade-title').innerHTML = `${currentTrade.icon} ${currentTrade.name}`;
      // Simple questions
      document.getElementById('questions').innerHTML = `
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
          <label class="block text-sm font-medium mb-3">Size / Quantity</label>
          <input type="text" onchange="updateAnswer('size', this.value)" placeholder="e.g. 25 metres" class="input input-bordered w-full bg-zinc-800">
        </div>
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
          <label class="block text-sm font-medium mb-3">Extras / Notes</label>
          <textarea onchange="updateAnswer('notes', this.value)" class="textarea textarea-bordered w-full h-28 bg-zinc-800" placeholder="Gate, colour, urgency..."></textarea>
        </div>
      `;
    }

    function updateAnswer(key, value) {
      answers[key] = value;
      generateSpec();
    }

    function generateSpec() {
      let spec = `JOB SPEC — ${currentTrade.name}\nDate: ${new Date().toLocaleDateString('en-AU')}\nLocation: Perth WA\n\n`;
      Object.keys(answers).forEach(k => { if (answers[k]) spec += `${k.toUpperCase()}: ${answers[k]}\n`; });
      spec += `\nPlease quote exactly on this scope.`;
      document.getElementById('spec-output').textContent = spec;
    }

    function copySpec() { navigator.clipboard.writeText(document.getElementById('spec-output').textContent).then(() => alert("✅ Copied!")); }
    function downloadPDF() {
      const text = document.getElementById('spec-output').textContent;
      const win = window.open('', '_blank');
      win.document.write(`<pre style="padding:40px; font-family:monospace; white-space:pre-wrap;">${text}</pre>`);
      win.document.close(); setTimeout(() => win.print(), 500);
    }
    function shareLink() { alert("Copy the spec above and send to tradies!"); }
    function backToHome() {
      document.getElementById('estimator').classList.add('hidden');
      document.getElementById('home').classList.remove('hidden');
    }

    // Start everything
    window.onload = () => {
      drawWheel();
      renderHome();
    };
  </script>
</body>
</html>
